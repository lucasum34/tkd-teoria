<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TKD Teoría</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d12;--surface:#17171f;--surface2:#1e1e28;--border:#2c2c3e;--red:#e8132a;--red-dim:rgba(232,19,42,0.15);--red-glow:rgba(232,19,42,0.3);--text:#f0f0f5;--muted:#7a7a9a;--faint:#3a3a50;--ok:#00c96e;--ok-dim:rgba(0,201,110,0.12);--ok-border:rgba(0,201,110,0.35);--err-dim:rgba(232,19,42,0.1);--err-border:rgba(232,19,42,0.35);--gold:#f5c842}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.on{display:flex}
.topbar{padding:18px 20px 14px;display:flex;align-items:center;gap:12px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.logo{width:40px;height:40px;background:var(--red);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 20px var(--red-glow)}
.logo-text h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;line-height:1}
.logo-text p{font-size:11px;color:var(--muted);margin-top:1px}
.back-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:active{background:var(--faint)}
.topbar-title{font-size:14px;font-weight:600;flex:1}
.topbar-right{font-size:12px;color:var(--muted)}
#home .body{padding:20px;flex:1}
.hero{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px 22px;margin-bottom:26px;position:relative;overflow:hidden}
.hero::after{content:'🥋';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:64px;opacity:.08}
.hero h2{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1.05;letter-spacing:1px}
.hero h2 em{color:var(--red);font-style:normal}
.hero p{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.6}
.sec-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.test-list{display:flex;flex-direction:column;gap:10px}
.test-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;width:100%;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif}
.test-card:active{border-color:var(--red);background:var(--surface2);transform:scale(.98)}
.t-icon{width:46px;height:46px;border-radius:13px;background:var(--red-dim);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.t-name{font-size:14px;font-weight:600;line-height:1.3}
.t-meta{font-size:12px;color:var(--muted);margin-top:2px}
.t-arr{margin-left:auto;color:var(--muted);font-size:22px}
.progbar{height:3px;background:var(--faint)}.progfill{height:100%;background:var(--red);box-shadow:0 0 8px var(--red);transition:width .4s ease}
.quiz-body{padding:24px 20px 20px;flex:1;overflow-y:auto}
.theory-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red-dim);border:1px solid var(--red-glow);border-radius:8px;padding:4px 12px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:14px}
.theory-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.5px;line-height:1.1;margin-bottom:14px}
.theory-content{font-size:15px;line-height:1.7;color:var(--text);white-space:pre-wrap}.theory-content b{color:var(--red);font-weight:600}
.theory-img{width:100%;border-radius:14px;margin-top:16px;object-fit:cover;max-height:280px}
.q-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.q-text{font-size:18px;font-weight:500;line-height:1.45;margin-bottom:22px}
.opts-list{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.4}
.opt:active:not(.locked){border-color:var(--red)}
.opt.correct{border-color:var(--ok)!important;background:var(--ok-dim)!important}
.opt.wrong{border-color:var(--red)!important;background:var(--err-dim)!important}
.opt-letter{width:28px;height:28px;min-width:28px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0}
.opt.correct .opt-letter{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrong .opt-letter{background:var(--red);color:#fff;border-color:var(--red)}
.fb{margin-top:14px;padding:13px 15px;border-radius:12px;font-size:13px;line-height:1.6;display:none}
.fb.ok{background:var(--ok-dim);border:1px solid var(--ok-border);color:#00c96e}
.fb.err{background:var(--err-dim);border:1px solid var(--err-border);color:#ff6b7a}
.bottom-wrap{padding:14px 20px 36px}
.btn-main{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 24px var(--red-glow);display:none}
.btn-main:active{opacity:.8}
.btn-ghost{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
#result{align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.res-icon{font-size:64px;margin-bottom:10px}
.res-score{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:1}
.res-score.pass{color:var(--ok)}.res-score.fail{color:var(--red)}
.res-lbl{font-size:14px;color:var(--muted);margin:4px 0 18px}
.res-msg{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:6px}
.res-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:26px}
.stats-row{display:flex;gap:10px;margin-bottom:26px;width:100%}
.stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 10px}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:30px}
.stat-n.g{color:var(--ok)}.stat-n.r{color:var(--red)}.stat-n.y{color:var(--gold)}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="home" class="screen on">
  <div class="topbar"><div class="logo">🥋</div><div class="logo-text"><h1>TKD TEORÍA</h1><p>Sistema de evaluación</p></div></div>
  <div class="body">
    <div class="hero"><h2>PREPARÁ TU<br><em>EXAMEN</em></h2><p>Evaluaciones de teoría para tus próximos grados en Taekwon-Do ITF.</p></div>
    <p class="sec-label">Tests disponibles</p>
    <div class="test-list" id="test-list"></div>
  </div>
</div>
<div id="quiz" class="screen">
  <div class="topbar"><button class="back-btn" id="bk">←</button><div class="topbar-title" id="quiz-title">Test</div><div class="topbar-right" id="quiz-cnt"></div></div>
  <div class="progbar"><div class="progfill" id="prog" style="width:0%"></div></div>
  <div class="quiz-body" id="quiz-body"></div>
  <div class="bottom-wrap"><button class="btn-main" id="nxt">SIGUIENTE →</button></div>
</div>
<div id="result" class="screen">
  <div class="res-icon" id="r-icon">🏆</div>
  <div class="res-score" id="r-score">0%</div>
  <div class="res-lbl" id="r-lbl"></div>
  <div class="res-msg" id="r-msg"></div>
  <div class="res-sub" id="r-sub"></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n g" id="r-ok">0</div><div class="stat-l">✅ Correctas</div></div>
    <div class="stat"><div class="stat-n r" id="r-err">0</div><div class="stat-l">❌ Incorrectas</div></div>
    <div class="stat"><div class="stat-n y" id="r-pct">0%</div><div class="stat-l">⭐ Puntaje</div></div>
  </div>
  <button class="btn-main" id="retry" style="display:block;margin-bottom:10px">🔄 INTENTAR DE NUEVO</button>
  <button class="btn-ghost" id="r-home">← Volver al inicio</button>
</div>

var curTest=null,curSlide=0,score=0,total=0,answered=false;
var L=['A','B','C','D','E','F','G','H'];
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on')});document.getElementById(id).classList.add('on');window.scrollTo(0,0)}
function renderHome(){
  var el=document.getElementById('test-list');
  if(!TESTS||!TESTS.length){el.innerHTML='<p style="color:var(--muted);text-align:center;padding:30px">No hay tests disponibles.</p>';return;}
  el.innerHTML=TESTS.map(function(t,i){
    var qs=t.slides.filter(function(s){return s.type==='question'}).length;
    return '<button class="test-card" data-i="'+i+'"><div class="t-icon">'+(t.icon||'📋')+'</div><div><div class="t-name">'+t.name+'</div><div class="t-meta">'+qs+' preguntas</div></div><span class="t-arr">›</span></button>';
  }).join('');
  document.querySelectorAll('.test-card').forEach(function(b){b.addEventListener('click',function(){startTest(parseInt(this.getAttribute('data-i')))})});
}
function startTest(i){curTest=i;curSlide=0;score=0;answered=false;total=TESTS[i].slides.filter(function(s){return s.type==='question'}).length;document.getElementById('quiz-title').textContent=TESTS[i].name;show('quiz');renderSlide()}
function renderSlide(){
  var t=TESTS[curTest],slides=t.slides,slide=slides[curSlide];
  var qNum=0;for(var i=0;i<=curSlide;i++)if(slides[i].type==='question')qNum++;
  document.getElementById('prog').style.width=Math.round((curSlide/slides.length)*100)+'%';
  document.getElementById('quiz-cnt').textContent=(curSlide+1)+' / '+slides.length;
  var nxt=document.getElementById('nxt');nxt.style.display='none';answered=false;
  var body=document.getElementById('quiz-body');
  if(slide.type==='theory'){
    body.innerHTML='<div class="theory-badge">📖 Teoría</div><div class="theory-title">'+slide.title+'</div><div class="theory-content">'+slide.content+'</div>'+(slide.img?'<img class="theory-img" src="'+slide.img+'" alt="">':'');
    nxt.textContent=curSlide+1<slides.length?'CONTINUAR →':'🏁 VER RESULTADO';nxt.style.display='block';
  } else {
    body.innerHTML='<div class="q-label">Pregunta '+qNum+' de '+total+'</div><div class="q-text">'+slide.q+'</div><div class="opts-list">'+slide.opts.map(function(o,i){return '<button class="opt" data-oi="'+i+'"><span class="opt-letter">'+L[i]+'</span><span>'+o+'</span></button>'}).join('')+'</div><div class="fb" id="fb"></div>';
    document.querySelectorAll('.opt').forEach(function(b){b.addEventListener('click',function(){pickOpt(parseInt(this.getAttribute('data-oi')))})});
  }
}
function pickOpt(idx){
  if(answered)return;answered=true;
  var slide=TESTS[curTest].slides[curSlide];
  var btns=document.querySelectorAll('.opt');btns.forEach(function(b){b.classList.add('locked')});
  var fb=document.getElementById('fb');
  if(idx===slide.ans){score++;btns[idx].classList.add('correct');fb.className='fb ok';fb.textContent=slide.ok||'¡Correcto!';}
  else{btns[idx].classList.add('wrong');if(btns[slide.ans])btns[slide.ans].classList.add('correct');fb.className='fb err';fb.textContent=slide.err||'Incorrecto.';}
  fb.style.display='block';
  var nxt=document.getElementById('nxt');nxt.textContent=curSlide+1<TESTS[curTest].slides.length?'SIGUIENTE →':'🏁 VER RESULTADO';nxt.style.display='block';
}
function showResult(){
  show('result');var tot=TESTS[curTest].slides.filter(function(s){return s.type==='question'}).length;
  var pct=tot>0?Math.round((score/tot)*100):100;var pass=pct>=60;
  document.getElementById('r-icon').textContent=pct===100?'🏆':pass?'🎉':'💪';
  document.getElementById('r-score').textContent=pct+'%';document.getElementById('r-score').className='res-score '+(pass?'pass':'fail');
  document.getElementById('r-lbl').textContent=score+' de '+tot+' correctas';
  document.getElementById('r-ok').textContent=score;document.getElementById('r-err').textContent=tot-score;document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-msg').textContent=pct===100?'¡PERFECTO!':pass?'¡MUY BIEN!':'SEGUÍ PRACTICANDO';
  document.getElementById('r-sub').textContent=pct===100?'Respondiste todo. Estás listo para el examen.':pass?'Aprobaste. Repasá las que fallaste.':'Seguí estudiando. ¡Vos podés!';
}
document.getElementById('bk').addEventListener('click',function(){show('home');renderHome()});
